{% set name = "orsopy" %}
{% set version = "1.2.3" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/orsopy-{{ version }}.tar.gz
  sha256: d11451dc0643f9b6437526d4ddf1ed382a95407bef17b5f1faf93b94e2ad764e

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - pip
  run:
    - python >={{ python_min }}
    - pyyaml >=5.4.1
    - numpy >=1.26.0

test:
  imports:
    - orsopy
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/reflectivity/orsopy
  summary: Support library of the Open Reflectometry Standards Organization (ORSO)
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - andyfaff
    - arm61
    - bmaranville
