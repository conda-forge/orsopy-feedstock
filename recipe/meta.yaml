{% set name = "orsopy" %}
{% set version = "1.2.2" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/orsopy-{{ version }}.tar.gz
  sha256: 39688a58ef39fbb21b69865eeaee93364ee4d7aea5caa45e6b65fc7e227837a0

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - pip
  run:
    - python >={{ python_min }}
    - pyyaml >=5.4.1

test:
  imports:
    - orsopy
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/reflectivity/orsopy
  summary: Support library of the Open Reflectometry Standards Organization (ORSO)
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - andyfaff
    - arm61
    - bmaranville
